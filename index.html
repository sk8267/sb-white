<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoreboard</title>
  
  <!-- Include Maven Pro font -->
  <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Link to external CSS file hosted on GitHub Pages -->
  <link rel="stylesheet" href="https://sk8267.github.io/sb/style.css?v=2"> <!-- Make sure the version is updated -->
</head>
<body>
  <div class="scoreboard">
    <div class="team team-1">
      <h3>TEAM 1</h3>
      <div class="controls">
        <button class="btn-decrease" data-team="0">−</button>
        <span id="score-0">0</span>
        <button class="btn-increase" data-team="0">+</button>
      </div>
    </div>

    <div class="team team-2">
      <h3>TEAM 2</h3>
      <div class="controls">
        <button class="btn-decrease" data-team="1">−</button>
        <span id="score-1">0</span>
        <button class="btn-increase" data-team="1">+</button>
      </div>
    </div>

    <div class="team team-3">
      <h3>TEAM 3</h3>
      <div class="controls">
        <button class="btn-decrease" data-team="2">−</button>
        <span id="score-2">0</span>
        <button class="btn-increase" data-team="2">+</button>
      </div>
    </div>
  </div>

  <!-- Link to external JavaScript file hosted on GitHub Pages -->
  <script src="https://sk8267.github.io/sb/script.js?v=1"></script>
</body>
</html>
